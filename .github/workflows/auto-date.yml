name: Auto date for wiki MD

on:
  push:
    branches: ["**"]
    paths: ["wiki/**/*.md"]
  pull_request:
    branches: ["**"]
    paths: ["wiki/**/*.md"]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dates:
    if: ${{ !contains(github.event.head_commit.message, '[auto-date]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Ensure updater exists
        run: |
          test -f scripts/update_wiki_dates.py || { echo "scripts/update_wiki_dates.py not found"; exit 1; }
          chmod +x scripts/update_wiki_dates.py

      - name: Determine changed files
        run: |
          set -e
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin ${{ github.base_ref }} ${{ github.head_ref }}
            git diff --name-only "origin/${{ github.base_ref }}...origin/${{ github.head_ref }}" -- 'wiki/**/*.md' > changed_files.txt
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            git diff --name-only "$before" "$after" -- 'wiki/**/*.md' > changed_files.txt
          fi
          cat changed_files.txt

      - name: Run updater
        run: python scripts/update_wiki_dates.py

      - name: Create PR with changes
        uses: peter-evans/create-pull-request@v6
        with:
          title: "[auto-date] Update wiki dates"
          body: |
            Автоматическое обновление `Date:` в изменённых файлах `wiki/**/*.md`.
            Сгенерировано GitHub Actions.
          commit-message: "[auto-date] Update wiki dates"
          base: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
          branch: chore/auto-date-${{ github.run_id }}
          labels: automated
          signoff: false
          draft: false
          delete-branch: true
